name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        env:
          VITE_MODAL_URL: ${{ secrets.VITE_MODAL_URL }}
        run: |
          cd frontend
          node -e "require('fs').writeFileSync('public/config.js', 'window.__CAMPUSCOIN_API_URL__=' + JSON.stringify(process.env.VITE_MODAL_URL || '') + ';');"
          npm ci
          npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          entryPoint: ./frontend
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CAMPUSCOIN_7A357 }}
          channelId: live
          projectId: campuscoin-7a357
